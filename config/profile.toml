# Owner-Profil und LLM-Einstellungen (Daten, kein Code).

[profile]
language = "de"
reading_time_min = 5

[llm]
ollama_url = "http://localhost:11434"
# Massen-Tier: schnell, für Zusammenfassen/Tagging vieler Items
enrich_model = "gemma4:26b"
# Synthese-Tier: stark, für TL;DR / Kuratierung (später auch Judge)
synth_model = "gemma4:31b"
max_items_enrich = 15
top_n = 8
# Quellen mit quality < diesem Wert werden nicht kuratiert (0.0 = aus). Seed-Qualität ist 0.5;
# `ibrief sources evolve` senkt schwache Quellen darunter. Lenient gewählt, damit neue Quellen passieren.
min_source_quality = 0.3

# A/B-Bakeoff (`ibrief bench`): Kandidaten für den Synthese-Tier (Reasoning/Wildcard).
# Das aktive synth_model ist immer als Baseline dabei. Leer lassen = nur Baseline.
# Tags vor dem Lauf verifizieren: `ollama pull <tag>` / `ollama list`.
synth_candidates = [ "gemma4:31b"]
# Kandidaten für den Massen-/Enrich-Tier — mit `ibrief bench enrich` fair gegen das aktive
# Modell messen, bevor `enrich_model` umgestellt wird (das dichte 26B ist für Ein-Satz-
# Zusammenfassungen überdimensioniert). gemma4:12b ist bereits installiert (kleineres dichtes
# Modell → schneller). qwen3:30b-a3b (MoE, ~3B aktiv/Token) ist das eigentliche Ziel, muss aber
# erst geladen werden: `ollama pull qwen3:30b-a3b` (sonst 404 im Lauf).
enrich_candidates = ["gemma4:26b", "gemma4:12b", "qwen3:30b-a3b"]

[store]
path = "ibrief.db"

[telegram]
# Push + Feedback-Buttons. Token kommt aus der Env-Var IBRIEF_TELEGRAM_TOKEN (nie in Config!).
enabled = false
chat_id = ""
